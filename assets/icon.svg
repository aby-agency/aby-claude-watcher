<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="108" fill="#030303"/>

  <!-- Tail wedge -->
  <path d="M 168 312 L 96 192 L 204 300 Z" fill="#a0d2b3"/>

  <!-- Body: half oval sitting on waterline y=336 -->

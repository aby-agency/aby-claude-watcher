    <path d="M 80 376 Q 176 368, 240 376"/>
    <path d="M 280 376 Q 368 368, 432 376"/>
    <path d="M 128 416 Q 216 408, 288 416"/>
    <path d="M 320 416 Q 392 408, 432 416"/>
    <path d="M 96 456 Q 200 448, 272 456"/>
    <path d="M 304 456 Q 384 448, 416 456"/>

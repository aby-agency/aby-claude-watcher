    M 128 336
    Q 120 256, 232 240
    Q 360 232, 432 272
    Q 464 300, 448 336 Z
  " fill="#a0d2b3"/>

  <!-- Wing -->
  <path d="M 272 288 Q 336 264, 400 296 Q 344 320, 272 304 Z" fill="#4d9070"/>

  <!-- Head -->
  <circle cx="236" cy="188" r="88" fill="#a0d2b3"/>

  <!-- Bill -->
  <path d="M 320 184 Q 392 176, 392 204 Q 392 228, 320 220 Z" fill="#4d9070"/>
  <path d="M 332 202 L 380 202" stroke="#2d5a3e" stroke-width="3" stroke-linecap="round"/>

  <!-- Eye -->

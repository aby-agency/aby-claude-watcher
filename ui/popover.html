<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Aby Claude Watcher — Popover</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      overflow: hidden;
      background: transparent;
    }
    .popover-body {
      /* Soft Glass ground — opaque, no backdrop-filter/translucency */
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }
    .popover-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .popover-open-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-secondary);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .popover-open-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    .popover-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .popover-list::-webkit-scrollbar {
      width: 4px;
    }
    .popover-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }
    .popover-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 12px;
    }
    /* Soft Glass card row — same recipe as .card: sheen + card-bg gradient
       layered over a solid base, opaque border, no backdrop-filter. */
    .pop-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      background: var(--card-sheen), var(--card-bg), var(--bg-secondary);
      border: 1px solid var(--card-border);
      transition: border-color var(--transition), background 0.15s;
    }
    .pop-item:hover {
      border-color: rgba(255, 255, 255, .18);
      background: var(--card-sheen), var(--card-bg), var(--bg-tertiary);
    }
    /* State color — single-sourced from --state-* via [data-state], same
       convention as .micro-item[data-state] in styles.css. */
    .pop-item[data-state="thinking"] { color: var(--state-thinking); }
    .pop-item[data-state="running"] { color: var(--state-running); }
    .pop-item[data-state="waiting"] { color: var(--state-waiting); }
    .pop-item[data-state="pending"] { color: var(--state-pending); }
    .pop-item[data-state="error"] { color: var(--state-error); }
    /* Glow-budget: only pending/waiting/error rows glow (action required).
       thinking/running stay calm — dot/spinner colored, no tint, no halo. */
    .pop-item[data-state="pending"],
    .pop-item[data-state="waiting"],
    .pop-item[data-state="error"] {
      background: var(--card-sheen), var(--card-bg), color-mix(in srgb, currentColor 12%, var(--bg-secondary));
      border-color: color-mix(in srgb, currentColor 40%, transparent);
      box-shadow: 0 0 16px -4px currentColor;
    }
    .pop-item[data-state="pending"] .pop-dot,
    .pop-item[data-state="waiting"] .pop-dot,
    .pop-item[data-state="error"] .pop-dot {
      box-shadow: 0 0 7px 0 currentColor;
    }
    .pop-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .pop-spinner {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      border-top-color: transparent;
      border-right-color: transparent;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
      box-sizing: border-box;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .pop-name {
      flex: 1;
      font-size: 12px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pop-state {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      text-transform: lowercase;
    }
    .popover-footer {
      display: flex;
      justify-content: flex-end;
      padding: 6px 10px;
      border-top: 1px solid var(--border);
    }
    .popover-quit-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      background: transparent;
      border: none;
      border-radius: 3px;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .popover-quit-btn:hover {
      background: var(--bg-tertiary);
      color: var(--state-error);
    }
  </style>
</head>
<body>
  <div class="popover-body">
    <div class="popover-header">
      <span id="popHeader">0 sessions</span>
      <button class="popover-open-btn" id="popOpenBtn">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        </svg>
        <span data-i18n="popover_open">Open</span>
      </button>
    </div>
    <div class="popover-list" id="popList"></div>
    <div class="popover-footer">
      <button class="popover-quit-btn" id="popQuitBtn" data-i18n-title="popover_quit_title" title="Quit Aby Claude Watcher">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span data-i18n="popover_quit">Quit</span>
      </button>
    </div>
  </div>
  <script src="../i18n.js"></script>
  <script src="popover.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Claude Watch — Popover</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      overflow: hidden;
      background: transparent;
    }
    .popover-body {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }
    .popover-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .popover-open-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-secondary);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .popover-open-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    .popover-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
    }
    .popover-list::-webkit-scrollbar {
      width: 4px;
    }
    .popover-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }
    .popover-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 12px;
    }
    .pop-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .pop-item:hover {
      background: var(--bg-tertiary);
    }
    .pop-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .pop-spinner {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
      box-sizing: border-box;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .pop-name {
      flex: 1;
      font-size: 12px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pop-state {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      text-transform: lowercase;
    }
    .popover-footer {
      display: flex;
      justify-content: flex-end;
      padding: 6px 10px;
      border-top: 1px solid var(--border);
    }
    .popover-quit-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      background: transparent;
      border: none;
      border-radius: 3px;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .popover-quit-btn:hover {
      background: var(--bg-tertiary);
      color: var(--state-error);
    }
  </style>
</head>
<body>
  <div class="popover-body">
    <div class="popover-header">
      <span id="popHeader">0 sessions</span>
      <button class="popover-open-btn" id="popOpenBtn">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        </svg>
        Ouvrir
      </button>
    </div>
    <div class="popover-list" id="popList"></div>
    <div class="popover-footer">
      <button class="popover-quit-btn" id="popQuitBtn" title="Quitter Claude Watch">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Quitter
      </button>
    </div>
  </div>
  <script src="popover.js"></script>
</body>
</html>
